<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 420" role="img" aria-label="Pause — a mindful-friction Android app">
  <!-- base -->
  <rect width="1280" height="420" fill="#1A1A1A"/>
  <!-- 40px grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#F5EFE4" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1280" height="420" fill="url(#grid)"/>

  <!-- lime top bar -->
  <rect x="0" y="0" width="1280" height="44" fill="#CCFF00"/>
  <text x="40" y="29" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="15" letter-spacing="6" fill="#1A1A1A" font-weight="700">ANDROID · EXPO SDK 57 · KOTLIN ACCESSIBILITY ENGINE · OTA · 100% ON-DEVICE</text>

  <!-- display title -->
  <text x="72" y="248" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-size="148" font-weight="900" letter-spacing="-4" fill="#F5EFE4">PAUSE<tspan fill="#CCFF00">.</tspan></text>

  <!-- tagline -->
  <text x="78" y="308" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="24" letter-spacing="1" fill="#F5EFE4">One breath between you and the feed.</text>

  <!-- corner badge -->
  <g transform="translate(1080, 96)">
    <rect width="140" height="140" fill="#CCFF00" stroke="#F5EFE4" stroke-width="3"/>
    <text x="70" y="52" text-anchor="middle" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="900" fill="#1A1A1A">FREE &amp;</text>
    <text x="70" y="84" text-anchor="middle" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="900" fill="#1A1A1A">OPEN</text>
    <text x="70" y="116" text-anchor="middle" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="900" fill="#1A1A1A">SOURCE</text>
  </g>

  <!-- mono footer -->
  <text x="72" y="384" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="15" letter-spacing="3" fill="#F5EFE4" fill-opacity="0.75">MINDFUL-FRICTION ANDROID APP · v1.0 · 2026 · HATIM EL HASSAK</text>
</svg>
